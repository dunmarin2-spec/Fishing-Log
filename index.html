<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        /* 💡 캡처될 구역 (입력창 포함) */
        #captureArea {
            background-color: #ffffff;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .photo-zone {
            width: 100%;
            aspect-ratio: 1 / 1; /* 사진은 깔끔하게 정사각형 */
            background-color: #f1f5f9;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        /* 💡 저장 시 입력창 느낌 안 나게 투명하게 처리 */
        .log-input {
            width: 100%;
            border: none;
            background: transparent;
            font-weight: 800;
            color: #1e293b;
            padding: 8px 0;
            outline: none;
            border-bottom: 1px solid #f1f5f9;
        }
        .log-input::placeholder { color: #cbd5e1; font-weight: 400; }

        .safe-bottom { height: 100px; } /* 갤러리 정보창 회피 공간 */
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-md mx-auto">
        
        <div id="captureArea">
            <div class="flex justify-between items-center border-b-2 border-slate-900 pb-2">
                <h1 class="text-xl font-black italic text-blue-600 tracking-tighter">IPJIL GUARD</h1>
                <span id="curDate" class="text-[10px] font-bold text-slate-400"></span>
            </div>

            <div class="photo-zone" onclick="document.getElementById('fileInput').click()">
                <img id="viewImg" class="hidden w-full h-full object-cover">
                <div id="uploadGuide" class="text-center">
                    <i data-lucide="camera" class="mx-auto mb-2 text-slate-300 w-10 h-10"></i>
                    <p class="text-xs font-bold text-slate-400">터치하여 사진 등록</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="space-y-1">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest">Species</p>
                        <input type="text" id="fish" placeholder="어종 입력" class="log-input text-xl">
                    </div>
                    <div class="w-24">
                        <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest">Size(cm)</p>
                        <input type="text" id="size" placeholder="00" class="log-input text-xl text-right">
                    </div>
                </div>

                <div>
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Location / Date</p>
                    <input type="text" id="loc" placeholder="포인트 명칭 입력" class="log-input text-sm">
                </div>

                <div>
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Equipment & Bait</p>
                    <textarea id="bait" placeholder="채비 및 미끼 기록..." class="log-input text-sm h-16 resize-none w-full"></textarea>
                </div>
            </div>

            <div class="safe-bottom flex flex-col justify-end pb-4">
                <p class="text-[7px] text-slate-200 font-black italic tracking-[0.5em] text-center uppercase">Certified Fishing Archive</p>
            </div>
        </div>

        <div class="mt-8 pb-12">
            <button onclick="saveToGallery()" class="w-full bg-blue-600 text-white font-black p-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition text-lg">
                <i data-lucide="download"></i> 지금 이 화면을 갤러리에 저장
            </button>
            <p class="text-center text-slate-400 text-[10px] mt-4 font-bold italic">위의 입력창이 그대로 이미지 파일로 저장됩니다!</p>
        </div>

        <footer class="text-center pb-10">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="inline-flex items-center gap-2 bg-[#FAE100] text-[#3C1E1E] px-4 py-2 rounded-xl font-bold text-xs">
                <span>PAY</span> 커피 한 잔 후원하기
            </a>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('curDate').innerText = new Date().toLocaleDateString();

        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1000;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const viewImg = document.getElementById('viewImg');
                    viewImg.src = canvas.toDataURL('image/jpeg', 0.9);
                    viewImg.classList.remove('hidden');
                    document.getElementById('uploadGuide').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveToGallery() {
            const area = document.getElementById('captureArea');
            if(document.getElementById('viewImg').classList.contains('hidden')) return alert('사진을 먼저 올려주세요!');
            
            // 💡 캡처 시 입력창의 커서나 테두리를 깔끔하게 보이기 위해 처리
            html2canvas(area, { 
                scale: 3, 
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                const fishName = document.getElementById('fish').value || '월척';
                link.download = `입질가드_${fishName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                alert('갤러리에 파일 저장 완료! 🎣');
            });
        }
    </script>
</body>
</html>
