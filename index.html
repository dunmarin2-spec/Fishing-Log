<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>입질 가드 (Fishing Log) - 찬둥 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 💡 필기체 스타일을 위한 폰트 추가 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        /* 💡 찬둥의 필기체 시그니처 스타일 */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #2563eb; transform: rotate(-12deg); margin-bottom: -8px; margin-left: -5px; z-index: 50; }
        
        .diary-card { width: 100%; max-width: 350px; aspect-ratio: 9 / 14; background: white; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 24px; position: relative;}
        
        .photo-box { width: 100%; height: 50%; border-radius: 16px; overflow: hidden; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .input-text { color: #1e293b; font-weight: 700; outline: none; border: none; background: transparent; padding: 0;}
        
        /* 캡처 시 글자 짤림 방지용 고정 텍스트 스타일 */
        .rendering .photo-box { background: transparent !important; }
        .rendering .input-text { display: none !important; }
        .fixed-text { display: none; color: #1e293b; font-weight: 700; word-break: break-all; white-space: pre-wrap; }
        .rendering .fixed-text { display: block !important; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="text-center mb-8 flex flex-col items-center">
            <span class="chan-doong-signature">찬둥의</span>
            <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">IPJIL GUARD</h1>
            <p class="text-xs text-slate-400 mt-1">갤러리 고화질 저장 전용 v2.0</p>
        </header>

        <section id="captureArea" class="diary-card mb-8 bg-white">
            <div class="flex justify-between items-end mb-4 border-b-2 border-slate-900 pb-2">
                <div class="flex flex-col relative">
                    <span class="chan-doong-signature text-sm">찬둥의</span>
                    <p id="cardDate" class="text-[9px] text-blue-600 font-bold mb-0.5"></p>
                    <div class="relative">
                        <input type="text" id="fish" placeholder="어종 입력" class="input-text text-xl italic uppercase w-32">
                        <div id="fish_fixed" class="fixed-text text-xl italic uppercase w-32"></div>
                    </div>
                </div>
                <div class="flex items-baseline text-blue-600 font-bold italic">
                    <div class="relative flex items-baseline">
                        <input type="text" id="size" placeholder="00" class="input-text text-4xl w-14 text-right">
                        <div id="size_fixed" class="fixed-text text-4xl w-14 text-right"></div>
                    </div>
                    <span class="text-xl ml-1">CM</span>
                </div>
            </div>
            
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <div id="uploadGuide" class="text-slate-300 flex flex-col items-center">
                    <i data-lucide="camera" class="w-8 h-8"></i>
                    <p class="text-[10px] font-bold mt-1 text-slate-400">사진 등록</p>
                </div>
                <img id="viewImg" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="space-y-3 flex-grow text-black">
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 overflow-hidden min-h-[50px]">
                    <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Location</p>
                    <div class="relative">
                        <input type="text" id="loc" placeholder="포인트 명칭 입력" class="input-text text-[12px] w-full text-black">
                        <div id="loc_fixed" class="fixed-text text-[12px] w-full text-black"></div>
                    </div>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 overflow-hidden min-h-[70px]">
                    <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Notes</p>
                    <div class="relative">
                        <textarea id="bait" placeholder="채비/미끼 기록..." class="input-text text-[12px] w-full h-12 resize-none leading-tight text-black"></textarea>
                        <div id="bait_fixed" class="fixed-text text-[12px] w-full h-12 resize-none leading-tight text-black"></div>
                    </div>
                </div>
            </div>
            <p class="text-[7px] text-center text-slate-300 mt-4 italic">Powered by Ipjil Guard</p>
        </section>

        <button onclick="saveAndExport()" class="w-full bg-blue-600 text-white font-black p-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition text-lg mb-8">
            <i data-lucide="download" class="w-6 h-6"></i> 갤러리에 조행기 초고화질 저장
        </button>

        <div class="text-center mb-8">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="inline-flex items-center gap-2 bg-[#FAE100] text-[#3C1E1E] px-6 py-3 rounded-xl font-bold text-sm shadow-sm active:scale-95 transition">
                <span>PAY</span> 찬둥에게 커피 후원하기 ☕
            </a>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm mb-10">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="낚시용품 최저가 검색" class="flex-grow p-3 border rounded-xl text-sm bg-slate-50 outline-none text-black">
                <button type="submit" class="bg-slate-800 text-white px-5 rounded-xl font-bold text-xs active:scale-95 transition">검색</button>
            </form>
            <p class="text-[9px] text-slate-400 mt-3 text-center">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'});

        let currentUrl = null;

        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const imgEl = document.getElementById('viewImg');
            const uploadGuide = document.getElementById('uploadGuide');
            if (currentUrl) {
                URL.revokeObjectURL(currentUrl);
            }
            currentUrl = URL.createObjectURL(file);
            imgEl.src = currentUrl;
            imgEl.onload = function() {
                imgEl.classList.remove('hidden');
                uploadGuide.style.display = 'none';
            };
            e.target.value = "";
        }

        async function saveAndExport() {
            const fish = document.getElementById('fish');
            const size = document.getElementById('size');
            const loc = document.getElementById('loc');
            const bait = document.getElementById('bait');
            const imgEl = document.getElementById('viewImg');
            if(!fish.value || imgEl.classList.contains('hidden')) {
                return alert('형님, 사진이랑 어종은 꼭 넣어주십쇼!');
            }
            const area = document.getElementById('captureArea');
            document.getElementById('fish_fixed').innerText = fish.value || ' ';
            document.getElementById('size_fixed').innerText = size.value || '00';
            document.getElementById('loc_fixed').innerText = loc.value || ' ';
            document.getElementById('bait_fixed').innerText = bait.value || ' ';
            area.classList.add('rendering');
            window.scrollTo(0, 0); 
            const canvas = await html2canvas(area, { 
                scale: 2.5, 
                backgroundColor: '#ffffff',
                useCORS: true 
            });
            area.classList.remove('rendering');
            const link = document.createElement('a');
            link.download = `입질가드_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            alert('형님! 인생 최대어 기록 갤러리에 저장했습니다! 🎣');
            if (currentUrl) {
                URL.revokeObjectURL(currentUrl);
                currentUrl = null;
            }
            [fish, size, loc, bait].forEach(i => i.value = '');
            imgEl.src = '';
            imgEl.classList.add('hidden');
            document.getElementById('uploadGuide').style.display = 'flex';
        }
    </script>
</body>
</html>
