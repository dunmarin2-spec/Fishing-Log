<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log) - Basic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; color: #1e293b; -webkit-tap-highlight-color: transparent; padding-bottom: 30px;}
        .diary-card { width: 100%; max-width: 350px; aspect-ratio: 9 / 14; background: white; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 24px; position: relative;}
        .photo-box { width: 100%; height: 50%; border-radius: 16px; overflow: hidden; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .archive-container { display: flex; overflow-x: auto; gap: 12px; padding: 10px 5px; scrollbar-width: none; -ms-overflow-style: none; }
        .archive-container::-webkit-scrollbar { display: none; }
        .archive-item { min-width: 100px; max-width: 100px; aspect-ratio: 9/14; flex-shrink: 0; position: relative; cursor: pointer; }
        .archive-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid #e2e8f0; }
        
        #fullscreenOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; cursor: zoom-out; }
        #fullscreenImg { max-width: 100%; max-height: 90vh; border-radius: 12px; }
        
        .input-text { color: #1e293b; font-weight: 700; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">IPJIL GUARD</h1>
            <button onclick="hardReset()" class="text-[10px] bg-rose-500 text-white font-bold px-3 py-1 rounded-full">저장소 강제초기화</button>
        </header>

        <section id="captureArea" class="diary-card mb-6 bg-white">
            <div class="flex justify-between items-end mb-4 border-b-2 border-slate-900 pb-2">
                <div>
                    <p id="cardDate" class="text-[9px] text-blue-600 font-bold mb-0.5"></p>
                    <input type="text" id="fish" placeholder="어종 입력" class="input-text text-xl italic uppercase bg-transparent border-none outline-none w-32 p-0">
                </div>
                <div class="flex items-baseline text-blue-600 font-bold italic">
                    <input type="text" id="size" placeholder="00" class="input-text text-4xl bg-transparent border-none outline-none w-14 text-right p-0">
                    <span class="text-xl ml-1">CM</span>
                </div>
            </div>
            
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <div id="uploadGuide" class="text-slate-300 flex flex-col items-center">
                    <i data-lucide="camera" class="w-8 h-8"></i>
                    <p class="text-[10px] font-bold mt-1 text-slate-400">사진 등록</p>
                </div>
                <img id="viewImg" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="space-y-3 flex-grow text-black">
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 overflow-hidden">
                    <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Location</p>
                    <input type="text" id="loc" placeholder="포인트 명칭 입력" class="input-text text-[12px] bg-transparent border-none outline-none w-full p-0 text-black">
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 overflow-hidden">
                    <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Notes</p>
                    <textarea id="bait" placeholder="채비/미끼 기록..." class="input-text text-[12px] bg-transparent border-none outline-none w-full h-12 resize-none leading-tight p-0 text-black"></textarea>
                </div>
            </div>
            <p class="text-[7px] text-center text-slate-300 mt-4 italic">Powered by Ipjil Guard</p>
        </section>

        <button onclick="saveAndExport()" class="w-full bg-slate-800 text-white font-black p-5 rounded-2xl shadow-lg flex items-center justify-center gap-2 active:scale-95 transition mb-10 text-lg">
            <i data-lucide="download"></i> 기본 저장 모드
        </button>

        <div class="border-t border-slate-200 pt-6">
            <h2 class="text-lg font-black text-slate-800 mb-3 px-1">최근 조행기 보관함</h2>
            <div id="archiveList" class="archive-container"></div>
        </div>
    </div>

    <div id="fullscreenOverlay" onclick="closeFullscreen()"><img id="fullscreenImg" src=""></div>

    <script>
        const STORAGE_KEY = 'ipjil_basic_v2';

        // 💡 [핵심 해결] 앱 켜질 때, 과거에 쌓아둔 똥(쓰레기 용량) 싹 다 강제 폭파!
        function cleanOldGarbage() {
            try {
                for (let i = localStorage.length - 1; i >= 0; i--) {
                    let key = localStorage.key(i);
                    // 현재 쓰는 키 빼고, ipjil 글자 들어간 예전 데이터는 무조건 삭제
                    if (key && key.includes('ipjil') && key !== STORAGE_KEY) {
                        localStorage.removeItem(key);
                    }
                }
            } catch (e) { console.error("청소 에러", e); }
        }
        cleanOldGarbage();

        let diaryLogs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString();
        renderArchive();

        // 수동 강제 초기화 버튼용 함수
        function hardReset() {
            if(confirm("저장소를 완전히 비우시겠습니까? (에러 지속 시 클릭)")) {
                localStorage.clear();
                diaryLogs = [];
                renderArchive();
                alert("싹 다 지웠습니다 형님!");
            }
        }

        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    document.getElementById('viewImg').src = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('viewImg').classList.remove('hidden');
                    document.getElementById('uploadGuide').style.display = 'none';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveAndExport() {
            try {
                const fish = document.getElementById('fish');
                const imgEl = document.getElementById('viewImg');
                
                if(!fish.value || imgEl.classList.contains('hidden')) {
                    alert('형님! 어종이랑 사진은 꼭 넣어주십쇼!');
                    return;
                }

                window.scrollTo(0, 0);

                document.querySelectorAll('input').forEach(el => {
                    el.setAttribute('value', el.value);
                    el.style.color = '#000000'; 
                });
                document.querySelectorAll('textarea').forEach(el => {
                    el.innerHTML = el.value;
                    el.style.color = '#000000';
                });

                const area = document.getElementById('captureArea');
                
                // 갤러리 저장용 원본 캡처
                const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#ffffff' });
                const cardImgData = canvas.toDataURL('image/jpeg', 0.9);

                // 💡 [핵심 해결 2] 보관함 썸네일을 손톱만하게 줄여서 용량 폭발 완전 차단!
                const thumbCanvas = document.createElement('canvas');
                const tCtx = thumbCanvas.getContext('2d');
                thumbCanvas.width = 150; // 가로 150 픽셀로 초소형화
                thumbCanvas.height = canvas.height * (150 / canvas.width);
                tCtx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
                
                // 압축률을 0.3으로 확 낮춰서 로컬스토리지에 쏙 들어가게 만듦
                const thumbData = thumbCanvas.toDataURL('image/jpeg', 0.3); 

                diaryLogs.unshift({ id: Date.now(), img: thumbData });
                if(diaryLogs.length > 10) diaryLogs = diaryLogs.slice(0, 10);
                
                // 여기서 에러나면 무조건 옛날 데이터 꽉 찬 거니까 위에서 청소한 게 먹힐 겁니다.
                localStorage.setItem(STORAGE_KEY, JSON.stringify(diaryLogs));
                renderArchive();

                const link = document.createElement('a');
                link.download = `입질가드_${fish.value}.jpg`;
                link.href = cardImgData;
                link.click();

                alert('형님, 과거 찌꺼기 싹 비우고 안전하게 저장 완료했습니다!');

                document.querySelectorAll('input, textarea').forEach(el => { el.value = ''; el.removeAttribute('value'); });
                document.querySelectorAll('textarea').forEach(el => el.innerHTML = '');
                imgEl.src = '';
                imgEl.classList.add('hidden');
                document.getElementById('uploadGuide').style.display = 'flex';

            } catch (error) {
                // 혹시라도 또 꽉 찼다고 하면 수동으로 비우실 수 있게 안내
                alert('형님, 폰 저장소가 꽉 꼬여있습니다! 우측 상단의 [저장소 강제초기화] 빨간 버튼을 한 번 눌러주십쇼!');
                console.error(error);
            }
        }

        function renderArchive() {
            const list = document.getElementById('archiveList');
            if(diaryLogs.length === 0) {
                list.innerHTML = '<div class="w-full text-center py-10 text-slate-400"><p class="text-xs font-bold">보관함이 비어있습니다.</p></div>';
                return;
            }
            list.innerHTML = diaryLogs.map(log => `
                <div class="archive-item">
                    <img src="${log.img}" onclick="openFullscreen('${log.img}')">
                </div>
            `).join('');
        }

        function openFullscreen(src) {
            document.getElementById('fullscreenImg').src = src;
            document.getElementById('fullscreenOverlay').style.display = 'flex';
        }

        function closeFullscreen() {
            document.getElementById('fullscreenOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
