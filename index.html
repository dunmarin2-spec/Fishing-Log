<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        /* 💡 폰에 저장될 카드 디자인 (낚시 잡지 느낌) */
        #captureArea {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 24px;
            border-radius: 24px;
            border: 2px solid #334155;
            display: none; /* 생성 전엔 숨김 */
        }
        .pay-btn { background-color: #FAE100; color: #3C1E1E !important; display: inline-flex; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 16px; font-weight: 800; gap: 8px; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md mx-auto">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-blue-500 flex justify-center items-center gap-2 italic tracking-tighter">
                <i data-lucide="anchor"></i> IPJIL GUARD
            </h1>
            <p class="text-slate-400 mt-2 text-xs font-bold uppercase tracking-widest">Digital Fishing Journal</p>
        </header>

        <section class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl mb-10">
            <div class="space-y-4">
                <label class="block bg-slate-900 border-2 border-dashed border-slate-700 p-5 rounded-2xl text-center cursor-pointer hover:border-blue-500 transition">
                    <i data-lucide="image-plus" class="mx-auto mb-1 text-slate-500"></i>
                    <span id="photoLabel" class="text-xs font-bold text-slate-400">월척 사진 선택</span>
                    <input type="file" accept="image/*" class="hidden" onchange="handleFile(event)">
                </label>
                <div id="formPreview" class="hidden h-48 w-full"><img id="previewImg" class="w-full h-full object-cover rounded-xl border border-slate-700"></div>
                
                <div class="grid grid-cols-2 gap-3">
                    <input id="fish" type="text" placeholder="어종" class="p-4 border-none rounded-xl bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="size" type="text" placeholder="크기(cm)" class="p-4 border-none rounded-xl bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <input id="loc" type="text" placeholder="포인트 (예: 가덕도 하방)" class="w-full p-4 border-none rounded-xl bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input id="tide" type="text" placeholder="물때 (예: 6물)" class="w-full p-4 border-none rounded-xl bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="bait" placeholder="채비/미끼 (예: 1호찌, 크릴)" class="w-full p-4 border-none rounded-xl bg-slate-900 text-sm h-20 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                
                <button onclick="generateCard()" class="w-full bg-blue-600 text-white font-black p-5 rounded-2xl shadow-lg active:scale-95 transition text-lg italic">GENERATE CARD</button>
            </div>
        </section>

        <div id="captureArea" class="mx-auto">
            <div class="flex justify-between items-end mb-4 border-b border-slate-700 pb-4">
                <div>
                    <p id="cardDate" class="text-[10px] text-blue-400 font-bold tracking-widest mb-1"></p>
                    <h2 id="cardFish" class="text-3xl font-black text-white italic uppercase"></h2>
                </div>
                <div class="text-right">
                    <p id="cardSize" class="text-4xl font-black text-blue-500 italic"></p>
                </div>
            </div>
            
            <div class="relative w-full h-72 rounded-xl overflow-hidden mb-6 border-4 border-slate-700 shadow-inner">
                <img id="cardImg" class="w-full h-full object-cover">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                    <p class="text-[9px] text-slate-500 font-bold mb-1 uppercase">Location</p>
                    <p id="resLoc" class="text-xs font-bold text-slate-200"></p>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                    <p class="text-[9px] text-slate-500 font-bold mb-1 uppercase">Tide</p>
                    <p id="resTide" class="text-xs font-bold text-slate-200"></p>
                </div>
            </div>
            
            <div class="mt-4 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <p class="text-[9px] text-slate-500 font-bold mb-1 uppercase">Equipment & Bait</p>
                <p id="resBait" class="text-xs font-bold text-slate-300 leading-relaxed"></p>
            </div>

            <div class="mt-6 flex justify-between items-center opacity-30">
                <p class="text-[8px] font-black italic tracking-tighter">OFFICIAL FISHING LOG</p>
                <i data-lucide="waves" class="w-4 h-4"></i>
            </div>
        </div>

        <div id="saveAction" class="hidden mt-6 pb-20">
            <button onclick="downloadImage()" class="w-full bg-green-600 text-white font-bold p-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition">
                <i data-lucide="download"></i> 내 휴대폰 갤러리에 저장 (파일)
            </button>
            <p class="text-center text-slate-500 text-[10px] mt-4 font-bold tracking-tighter italic">이미지로 저장하면 평생 소장 가능합니다!</p>
        </div>

        <footer class="text-center mt-10">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="pay-btn shadow-md">
                <span style="background: #3C1E1E; color: #FAE100; padding: 2px 6px; border-radius: 5px; font-size: 11px; font-weight: 900;">PAY</span>
                <span>커피 후원하기</span>
            </a>
        </footer>
    </div>

    <script>
        let currentImg = null;
        lucide.createIcons();

        function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800; // 저장용이니까 화질 조금 더 높임
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImg = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById('previewImg').src = currentImg;
                    document.getElementById('formPreview').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generateCard() {
            const f = document.getElementById('fish').value;
            const s = document.getElementById('size').value;
            const l = document.getElementById('loc').value;
            const t = document.getElementById('tide').value;
            const b = document.getElementById('bait').value;

            if(!f || !currentImg) return alert('어종과 사진은 필수!');

            // 데이터 박제
            document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'2-digit', day:'2-digit'});
            document.getElementById('cardFish').innerText = f;
            document.getElementById('cardSize').innerText = s + 'CM';
            document.getElementById('resLoc').innerText = l || '-';
            document.getElementById('resTide').innerText = t || '-';
            document.getElementById('resBait').innerText = b || '기록 없음';
            document.getElementById('cardImg').src = currentImg;
            
            // 화면 노출
            document.getElementById('captureArea').style.display = 'block';
            document.getElementById('saveAction').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            lucide.createIcons();
        }

        function downloadImage() {
            const area = document.getElementById('captureArea');
            // 💡 html2canvas로 영역 전체를 고화질 이미지로 변환
            html2canvas(area, { 
                scale: 3, // 저장할 땐 고화질로!
                backgroundColor: '#0f172a' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `입질가드_${document.getElementById('cardFish').innerText}_${document.getElementById('cardSize').innerText}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                alert('갤러리에 조행기가 파일로 저장되었습니다! 🎣');
            });
        }
    </script>
</body>
</html>
