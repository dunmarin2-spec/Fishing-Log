<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .pay-btn { background-color: #FAE100; color: #3C1E1E !important; display: inline-flex !important; align-items: center; justify-content: center; padding: 14px 24px; border-radius: 16px; font-weight: 800; gap: 8px; min-width: 260px; box-shadow: 0 4px 15px rgba(250, 225, 0, 0.3); transition: all 0.2s; font-size: 15px; }
        .pay-btn:active { transform: scale(0.96); }
        
        /* 💡 사진 확대 모달 */
        #photoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        #photoModal.active { display: flex; }
        #photoModal img { max-width: 95%; max-height: 85%; object-fit: contain; border-radius: 8px; shadow: 0 0 30px rgba(0,0,0,1); }

        /* 가로 스크롤 사진 리스트 */
        .photo-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .photo-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold flex justify-center items-center gap-2"><i data-lucide="waves" class="text-blue-600"></i> 입질 가드</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="exportData()" class="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold">백업</button>
                <label class="bg-white border px-4 py-2 rounded-full text-xs font-bold cursor-pointer">불러오기<input type="file" class="hidden" onchange="importData(event)"></label>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="camera" class="text-blue-500"></i> 조과 등록</h2>
                <div class="space-y-4">
                    <label class="block bg-blue-50 text-blue-700 border-2 border-dashed border-blue-200 p-4 rounded-2xl text-center cursor-pointer active:scale-95 transition">
                        <i data-lucide="image-plus" class="mx-auto mb-1"></i> <span class="text-xs font-bold">사진 여러 장 선택</span>
                        <input type="file" accept="image/*" multiple class="hidden" onchange="handleFiles(event)">
                    </label>
                    <div id="formPhotoPreview" class="photo-scroll"></div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input id="fish" type="text" placeholder="어종" class="p-3 border rounded-xl bg-slate-50 text-sm">
                        <input id="size" type="text" placeholder="크기(cm)" class="p-3 border rounded-xl bg-slate-50 text-sm">
                    </div>
                    <input id="loc" type="text" placeholder="포인트" class="w-full p-3 border rounded-xl bg-slate-50 text-sm">
                    <input id="tide" type="text" placeholder="물때" class="w-full p-3 border rounded-xl bg-slate-50 text-sm">
                    <textarea id="bait" placeholder="채비 및 미끼" class="w-full p-3 border rounded-xl bg-slate-50 text-sm h-20"></textarea>
                    <button onclick="addLog()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl shadow-lg">저장하기</button>
                </div>
            </section>

            <section class="lg:col-span-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 min-h-[500px]">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-black"><i data-lucide="scroll" class="text-amber-500"></i> 나의 조행기</h2>
                <div id="logList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
        </main>

        <footer class="mt-20 text-center pb-10">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="pay-btn"><span class="bg-slate-900 text-yellow-400 px-2 py-0.5 rounded text-[10px]">PAY</span> 커피 한 잔 선물하기</a>
        </footer >
    </div>

    <div id="photoModal" onclick="this.classList.remove('active')">
        <img id="modalImg" src="">
        <p class="absolute bottom-10 text-white text-xs">화면을 누르면 닫힙니다</p>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('fishing_v6') || '[]');
        let tempImages = [];

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    tempImages.push(event.target.result);
                    renderFormPreview();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderFormPreview() {
            const div = document.getElementById('formPhotoPreview');
            div.innerHTML = tempImages.map((img, i) => `
                <div class="relative flex-shrink-0">
                    <img src="${img}" class="w-16 h-16 object-cover rounded-lg border">
                    <button onclick="tempImages.splice(${i},1);renderFormPreview()" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addLog() {
            const fish = document.getElementById('fish').value;
            const loc = document.getElementById('loc').value;
            if(!fish || !loc) return alert('어종과 포인트는 필수!');
            
            logs.unshift({
                id: Date.now(),
                fish, loc,
                size: document.getElementById('size').value,
                tide: document.getElementById('tide').value,
                bait: document.getElementById('bait').value,
                images: [...tempImages],
                date: new Date().toLocaleDateString()
            });
            save();
            tempImages = [];
            renderFormPreview();
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            if(!logs.length) return list.innerHTML = '<p class="text-center py-20 text-slate-400">조행기가 없습니다.</p>';
            
            list.innerHTML = logs.map((log, idx) => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm text-black">
                    <div class="flex justify-between items-start mb-2">
                        <div><p class="text-[10px] text-blue-500 font-bold">${log.date}</p><h3 class="font-bold text-lg">${log.fish} <span class="text-sm font-normal text-slate-400">${log.size}cm</span></h3></div>
                        <button onclick="deleteLog(${idx})" class="text-slate-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    <div class="photo-scroll mb-3">
                        ${log.images.map(img => `<img src="${img}" onclick="zoom('${img}')" class="w-32 h-32 object-cover rounded-xl flex-shrink-0 cursor-pointer border border-white shadow-sm">`).join('')}
                    </div>
                    <div class="text-[11px] space-y-1">
                        <p>📍 ${log.loc} | 🌊 ${log.tide || '-'}</p>
                        <p class="text-slate-500">🎣 ${log.bait || '-'}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function zoom(src) {
            const m = document.getElementById('photoModal');
            document.getElementById('modalImg').src = src;
            m.classList.add('active');
        }

        function deleteLog(i) { if(confirm('삭제할까요?')) { logs.splice(i,1); save(); renderLogs(); } }
        function save() { try { localStorage.setItem('fishing_v6', JSON.stringify(logs)); } catch(e) { alert('용량 초과! 오래된 사진을 지우거나 백업하세요.'); } }
        function exportData() {
            const blob = new Blob([JSON.stringify(logs)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '입질가드_기록.json'; a.click();
        }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { logs = JSON.parse(ev.target.result); save(); renderLogs(); };
            reader.readAsText(e.target.files[0]);
        }

        renderLogs();
    </script>
</body>
</html>
