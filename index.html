<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .diary-card { width: 100%; max-width: 350px; aspect-ratio: 9 / 14; background: white; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-radius: 20px; }
        .photo-box { width: 100%; height: 50%; border-radius: 12px; overflow: hidden; background: #f1f5f9; border: 1px solid #e2e8f0; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .archive-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .archive-container::-webkit-scrollbar { display: none; }
        .archive-item { min-width: 80%; scroll-snap-align: center; position: relative; cursor: pointer; }
        #fullscreenOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; cursor: zoom-out; }
        #fullscreenImg { max-width: 100%; max-height: 90vh; border-radius: 10px; }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">IPJIL GUARD</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="exportToPhone()" class="bg-slate-800 text-white px-4 py-2 rounded-full text-[10px] font-bold shadow-md">일기장 파일로 저장</button>
                <label class="bg-white border border-slate-300 px-4 py-2 rounded-full text-[10px] font-bold cursor-pointer shadow-sm">
                    일기장 불러오기 <input type="file" accept=".json" class="hidden" onchange="importFromPhone(event)">
                </label>
            </div>
        </header>

        <section id="captureArea" class="diary-card mb-6 shadow-2xl">
            <div class="flex justify-between items-end mb-4 border-b-2 border-slate-900 pb-2 text-black text-black">
                <div>
                    <p id="cardDate" class="text-[9px] text-blue-600 font-bold mb-0.5"></p>
                    <input type="text" id="fish" placeholder="어종 입력" class="text-xl font-black text-slate-900 italic uppercase bg-transparent border-none outline-none w-32">
                </div>
                <div class="flex items-baseline text-blue-600 text-black">
                    <input type="text" id="size" placeholder="00" class="text-3xl font-black italic bg-transparent border-none outline-none w-12 text-right">
                    <span class="font-bold italic">CM</span>
                </div>
            </div>
            
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <div id="uploadGuide" class="text-slate-300 flex flex-col items-center">
                    <i data-lucide="camera"></i><p class="text-[9px] font-bold mt-1">사진 등록</p>
                </div>
                <img id="viewImg" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="space-y-3 flex-grow text-black">
                <div class="bg-slate-50 p-2 rounded-lg border border-slate-100">
                    <p class="text-[7px] text-slate-400 font-bold uppercase tracking-widest">Location</p>
                    <input type="text" id="loc" placeholder="포인트 명칭" class="text-[11px] font-bold text-slate-800 bg-transparent border-none outline-none w-full">
                </div>
                <div class="bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                    <p class="text-[7px] text-slate-400 font-bold uppercase tracking-widest">Notes</p>
                    <textarea id="bait" placeholder="채비/미끼 기록..." class="text-[11px] font-medium text-slate-700 bg-transparent border-none outline-none w-full h-10 resize-none leading-tight"></textarea>
                </div>
            </div>
            <div class="h-10"></div>
        </section>

        <button onclick="saveAndExport()" class="w-full bg-blue-600 text-white font-black p-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 active:scale-95 transition mb-10">
            <i data-lucide="download"></i> 조행기 저장 (갤러리+보관함)
        </button>

        <div class="border-t border-slate-200 pt-6">
            <h2 class="text-lg font-black text-slate-800 mb-2">현재 보관함</h2>
            <div id="archiveList" class="archive-container"></div>
        </div>
    </div>

    <div id="fullscreenOverlay" onclick="closeFullscreen()"><img id="fullscreenImg" src=""></div>

    <script>
        let diaryLogs = JSON.parse(localStorage.getItem('ipjil_phone_v23') || '[]');
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString();
        renderArchive();

        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1000;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    document.getElementById('viewImg').src = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById('viewImg').classList.remove('hidden');
                    document.getElementById('uploadGuide').style.display = 'none';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveAndExport() {
            const fish = document.getElementById('fish').value;
            const img = document.getElementById('viewImg').src;
            if(!fish || !img) return alert('사진과 어종 필수!');

            const area = document.getElementById('captureArea');
            const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');

            // 1. 이미지 파일로 갤러리 저장
            const link = document.createElement('a');
            link.download = `입질가드_${fish}.png`;
            link.href = imgData;
            link.click();

            // 2. 임시 보관함 추가
            const newEntry = { id: Date.now(), img: imgData };
            diaryLogs.unshift(newEntry);
            
            // 💡 LocalStorage 용량 초과 방지 (최근 10개만 유지, 나머지는 파일로 백업 권장)
            if(diaryLogs.length > 10) {
                alert("임시 보관함이 찼습니다. 상단 '일기장 파일 저장'을 눌러 폰에 보관하세요!");
                diaryLogs = diaryLogs.slice(0, 10);
            }
            
            localStorage.setItem('ipjil_phone_v23', JSON.stringify(diaryLogs));
            renderArchive();
            alert('저장 완료! (최근 기록 10개만 앱에 표시됩니다)');
        }

        // 💡 [핵심] 폰으로 데이터 짬처리
        function exportToPhone() {
            if(diaryLogs.length === 0) return alert("저장할 데이터가 없습니다.");
            const dataStr = JSON.stringify(diaryLogs);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `내_낚시_일기장_${new Date().toLocaleDateString()}.json`;
            link.href = url;
            link.click();
            alert("모든 기록이 .json 파일로 폰에 저장되었습니다!");
        }

        // 💡 [핵심] 폰에서 데이터 다시 가져오기
        function importFromPhone(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    diaryLogs = imported;
                    localStorage.setItem('ipjil_phone_v23', JSON.stringify(diaryLogs));
                    renderArchive();
                    alert("폰에 있던 기록을 모두 불러왔습니다!");
                } catch(err) { alert("잘못된 파일입니다."); }
            };
            reader.readAsText(file);
        }

        function renderArchive() {
            const list = document.getElementById('archiveList');
            list.innerHTML = diaryLogs.map(log => `
                <div class="archive-item">
                    <img src="${log.img}" onclick="openFullscreen('${log.img}')" class="w-full rounded-2xl shadow-lg border">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openFullscreen(src) {
            document.getElementById('fullscreenImg').src = src;
            document.getElementById('fullscreenOverlay').style.display = 'flex';
        }

        function closeFullscreen() {
            document.getElementById('fullscreenOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
