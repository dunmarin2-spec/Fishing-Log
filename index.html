<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>입질 가드 (Fishing Log)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f9ff; color: #1e293b; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .pay-btn {
            background-color: #FAE100; color: #3C1E1E !important; display: inline-flex !important; align-items: center;
            justify-content: center; padding: 14px 24px; border-radius: 16px; font-weight: 800; text-decoration: none !important;
            gap: 8px; min-width: 260px; white-space: nowrap; box-shadow: 0 4px 15px rgba(250, 225, 0, 0.25);
            transition: all 0.2s; font-size: 15px;
        }
        .pay-btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body class="py-6 sm:py-10 px-4">
    <div class="max-w-5xl mx-auto flex flex-col min-h-screen">
        
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-900 flex justify-center items-center gap-2 tracking-tighter text-black">
                <i data-lucide="waves" class="text-blue-600 w-8 h-8"></i> 입질 가드
            </h1>
            <p class="text-slate-500 mt-2 text-xs font-medium italic">나만의 비밀 포인트와 인생샷 1장을 기록하라</p>
            
            <div class="flex justify-center gap-2 mt-6 font-bold">
                <button onclick="exportData()" class="bg-blue-800 text-white px-5 py-2.5 rounded-full text-xs shadow-md">데이터 백업</button>
                <label class="bg-white border border-blue-200 text-blue-700 px-5 py-2.5 rounded-full text-xs cursor-pointer shadow-sm">
                    불러오기 <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </header>

        <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100 text-black">
                    <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-slate-800">
                        <i data-lucide="anchor" class="w-5 h-5 text-blue-500"></i> 오늘의 출조 기록
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-600">월척 인증샷 (딱 1장만)</label>
                            <label class="block bg-blue-50 text-blue-700 border-2 border-dashed border-blue-200 p-4 rounded-2xl text-center cursor-pointer mb-2 hover:bg-blue-100 transition">
                                <i data-lucide="camera" class="mx-auto mb-1 w-6 h-6"></i> <span id="photoLabel" class="text-xs font-bold">사진 선택 (자동 압축)</span>
                                <input type="file" accept="image/*" class="hidden" onchange="handleSingleFile(event)">
                            </label>
                            <div id="formPreview" class="relative hidden w-full h-40">
                                <img id="previewImg" src="" class="w-full h-full object-cover rounded-xl border border-slate-200">
                                <button onclick="removeTempImg()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1.5 shadow-md active:scale-90"><i data-lucide="x" class="w-4 h-4"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-3 text-black">
                            <input id="fishNameInput" type="text" placeholder="어종 (예: 감성돔)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm">
                            <input id="sizeInput" type="text" placeholder="크기 (cm)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm">
                        </div>
                        <input id="locationInput" type="text" placeholder="포인트 (예: 가덕도 방파제)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm mb-2">
                        <input id="tideInput" type="text" placeholder="물때 (예: 4물)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 text-sm mb-2">
                        <textarea id="baitInput" placeholder="미끼 및 채비 (예: 크릴, 0.8호 전자찌)" class="w-full p-3 border rounded-xl outline-none mb-4 h-20 bg-slate-50 text-sm"></textarea>
                        
                        <button onclick="addLog()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl hover:bg-blue-700 active:scale-95 text-sm shadow-md transition">조과 저장하기</button>
                    </div>
                </div>
            </section>

            <section class="lg:col-span-8 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100 min-h-[400px]">
                    <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-slate-800 text-black">
                        <i data-lucide="scroll" class="w-5 h-5 text-amber-500"></i> 나의 황금 조행기
                    </h2>
                    <div id="logList" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-black"></div>
                </div>
            </section>
        </main>

        <footer class="mt-16 text-center border-t border-slate-200 pt-10 pb-12 px-4">
            <div class="mb-12">
                <p class="text-sm font-bold text-slate-600 mb-5 text-black">손맛을 보셨다면, 앱 개발자를 위해 커피 한 잔!</p>
                <div class="flex justify-center">
                    <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="pay-btn shadow-md">
                        <span style="background: #3C1E1E; color: #FAE100; padding: 2px 6px; border-radius: 5px; font-size: 11px; font-weight: 900;">PAY</span>
                        <span>출조비 후원하기</span>
                    </a>
                </div>
            </div>

            <div class="max-w-[500px] mx-auto bg-white border-2 border-blue-100 rounded-2xl overflow-hidden shadow-sm">
                <div class="bg-blue-50 py-2.5 px-4 border-b border-blue-100 text-left">
                    <span class="text-[10px] font-bold text-blue-700 uppercase">Fishing Gear Search</span>
                </div>
                <div class="p-6">
                    <p class="text-xs font-bold text-slate-800 mb-4 text-black text-left">낚싯대, 릴, 아이스박스 최저가 검색</p>
                    <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2 text-black">
                        <input type="hidden" name="channel" value="user_side_view">
                        <input type="text" name="q" placeholder="시마노 / 다이와 낚시용품" class="flex-grow p-3 border border-slate-200 rounded-xl text-sm bg-slate-50 text-black outline-none focus:ring-1 focus:ring-blue-400">
                        <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm whitespace-nowrap active:scale-95 transition">검색</button>
                    </form>
                </div>
                <p class="text-[8px] text-slate-400 px-6 pb-4 leading-tight text-left italic">
                    "이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."
                </p>
            </div>
        </footer>
    </div>

    <script>
        // 💡 아예 새로운 키를 써서 예전에 꼬인 데이터를 피함
        let logs = JSON.parse(localStorage.getItem('fishing_v9_single') || '[]');
        let tempSingleImg = null; // 배열이 아닌 단일 변수로 1장만 저장

        lucide.createIcons();
        renderLogs();

        // 💡 1장 전용 압축 로직
        function handleSingleFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            const labelSpan = document.getElementById('photoLabel');
            const originalText = "사진 변경하기";
            labelSpan.textContent = "사진 압축 중...";

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 1장이니까 해상도를 약간 키움 (600px)
                    const max_size = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // 압축해서 변수에 덮어쓰기 (기존 사진 날림)
                    tempSingleImg = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('previewImg').src = tempSingleImg;
                    document.getElementById('formPreview').classList.remove('hidden');
                    labelSpan.textContent = originalText;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 폼에서 사진 지우기
        function removeTempImg() {
            tempSingleImg = null;
            document.getElementById('formPreview').classList.add('hidden');
            document.getElementById('previewImg').src = "";
            document.querySelector('input[type="file"]').value = "";
            document.getElementById('photoLabel').textContent = "사진 선택 (자동 압축)";
        }

        function addLog() {
            const fish = document.getElementById('fishNameInput').value.trim();
            const loc = document.getElementById('locationInput').value.trim();

            if(!fish || !loc) return alert("어종과 포인트를 입력해 주세요!");

            const newLog = {
                id: Date.now(), fish, loc,
                size: document.getElementById('sizeInput').value.trim(),
                tide: document.getElementById('tideInput').value.trim(),
                bait: document.getElementById('baitInput').value.trim(),
                image: tempSingleImg, // 💡 단일 사진 저장
                date: new Date().toLocaleDateString()
            };

            logs.unshift(newLog);
            save();
            removeTempImg(); // 폼 초기화
            document.querySelectorAll('input[type="text"], textarea').forEach(i => i.value = ''); 
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            if(!logs.length) {
                list.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400 italic text-sm">기록된 조행기가 없습니다. 첫 월척을 등록해 보세요!</p>';
            } else {
                list.innerHTML = logs.map((log, idx) => `
                    <div class="bg-slate-50 p-5 rounded-3xl border border-blue-50 shadow-sm text-black flex flex-col h-full">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">${log.date}</span>
                                <h3 class="text-xl font-extrabold text-slate-800 mt-1 text-black">${log.fish} <span class="text-sm font-normal text-blue-500">${log.size ? log.size+'cm' : ''}</span></h3>
                            </div>
                            <button onclick="deleteLog(${idx})" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5 text-black"></i></button>
                        </div>
                        
                        ${log.image ? `
                            <div class="mb-4 w-full h-48 sm:h-56 bg-white rounded-xl overflow-hidden border border-slate-200">
                                <img src="${log.image}" class="w-full h-full object-cover" alt="조과 사진">
                            </div>
                        ` : ''}

                        <div class="space-y-2 text-black mt-auto">
                            <p class="text-[11px] font-bold text-slate-600 flex items-center gap-1.5"><i data-lucide="map-pin" class="w-4 h-4 text-blue-500"></i> ${log.loc} <span class="text-slate-300 mx-1">|</span> <i data-lucide="wind" class="w-4 h-4 text-blue-500"></i> ${log.tide || '-'}</p>
                            <div class="bg-white p-3 rounded-xl border border-slate-100 text-[11px] text-slate-600 leading-relaxed">
                                <b class="text-slate-800">채비:</b> ${log.bait || '내용 없음'}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function save() { 
            try { localStorage.setItem('fishing_v9_single', JSON.stringify(logs)); } 
            catch (e) { alert("저장 용량 초과! 오래된 조행기를 삭제해 주세요."); } 
        }
        
        function deleteLog(i) {
            if(confirm("이 조행기를 삭제하시겠습니까?")) { logs.splice(i, 1); save(); renderLogs(); }
        }

        function exportData() {
            if(!logs.length) return alert("데이터가 없습니다!");
            const blob = new Blob([JSON.stringify(logs)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `입질가드_1장버전_백업.json`; a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        logs = data; save(); renderLogs(); alert("복구 완료!");
                    }
                } catch(e) { alert("파일 형식이 틀립니다."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
